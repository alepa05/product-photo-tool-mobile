<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scontorno Automatico</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="wrap">
    <div class="card">
      <h1>Scontorno Automatico</h1>
      <p class="sub">Scatta o carica una foto, genera il JPG e invialo via Gmail.</p>

      <form id="uploadForm">
        <label>Codice articolo</label>
        <input id="codice" required />

        <label>Email destinatario</label>
        <input id="email" type="email" required />

        <div class="button-row">
          <label for="cameraInput" class="secondary file-trigger">Scatta foto</label>
          <label for="fileInput" class="secondary file-trigger">Scegli file</label>
        </div>

        <input id="cameraInput" type="file" accept="image/*" capture="environment" class="file-input-hidden">
        <input id="fileInput" type="file" accept="image/*" class="file-input-hidden">

        <div id="selectedFile">Nessun file selezionato</div>
        <img id="previewUpload" class="preview hidden" alt="Anteprima foto selezionata">

        <button type="submit">Genera immagine</button>
      </form>

      <p id="status"></p>

      <div id="result" class="hidden">
        <h2>Risultato</h2>
        <img id="previewResult" class="result-img" alt="Risultato">
        <a id="downloadLink" class="download-btn">Scarica JPG</a>

        <div class="actions">
          <button type="button" id="sendBtn">Invia email</button>
          <button type="button" id="newBtn" class="secondary-btn">Nuova immagine</button>
        </div>
      </div>
    </div>
  </main>

<footer class="footer">
  Developed by Alessandro Paglietta
</footer>

<script src="/app.js"></script>
</body>
</html>
