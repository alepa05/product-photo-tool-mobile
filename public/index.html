<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Packshot Automatico</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="wrap">
    <div class="card">
      <h1>Packshot Automatico</h1>
      <p class="sub">Scatta o carica una foto, genera il JPG e invialo via Gmail.</p>

      <form id="uploadForm">
        <label class="label" for="codice">Codice articolo</label>
        <input id="codice" name="codice" type="text" placeholder="Es. 0334415" required />

        <label class="label" for="email">Email destinatario</label>
        <input id="email" name="email" type="email" placeholder="esempio@gmail.com" required />

        <label class="label">Foto prodotto</label>

        <div class="button-row">
          <label class="secondary-button" for="cameraInput">Scatta foto</label>
          <label class="secondary-button" for="fileInput">Scegli file</label>
        </div>

        <input
          id="cameraInput"
          class="visually-hidden"
          type="file"
          accept="image/jpeg,image/png"
          capture="environment"
        />

        <input
          id="fileInput"
          class="visually-hidden"
          type="file"
          accept="image/jpeg,image/png"
        />

        <div id="selectedFile" class="selected-file">Nessun file selezionato</div>

        <button type="submit">Genera e invia</button>
      </form>

      <p id="status"></p>

      <div id="result" class="hidden">
        <h2>Risultato</h2>
        <img id="preview" alt="Anteprima risultato" />
        <a id="downloadLink" download>Scarica JPG</a>
      </div>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
