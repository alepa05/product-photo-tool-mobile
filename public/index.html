<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Packshot Automatico</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="wrap">
    <div class="card">
      <h1>Packshot Automatico</h1>
      <p class="sub">Scatta o carica una foto, genera il JPG e invialo via Gmail.</p>

      <form id="uploadForm">
        <label>Codice articolo</label>
        <input id="codice" required />

        <label>Email destinatario</label>
        <input id="email" type="email" required />

        <div class="button-row">
          <label for="cameraInput" class="secondary">Scatta foto</label>
          <label for="fileInput" class="secondary">Scegli file</label>
        </div>

        <input id="cameraInput" type="file" accept="image/*" capture="environment" hidden>
        <input id="fileInput" type="file" accept="image/*" hidden>

        <div id="selectedFile">Nessun file selezionato</div>
        <img id="previewUpload" class="preview hidden">

        <button type="submit">Genera immagine</button>
      </form>

      <p id="status"></p>

      <div id="result" class="hidden">
        <img id="previewResult" class="result-img">

        <p id="counter"></p>

        <div class="actions">
          <button id="newBtn" class="secondary">Aggiungi altra immagine</button>
          <button id="sendBtn">Invia email</button>
        </div>
      </div>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
